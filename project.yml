name: LebaneseLearn
options:
  bundleIdPrefix: com.arabicisbeautiful
  deploymentTarget:
    iOS: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  LebaneseLearn:
    type: application
    platform: iOS
    sources:
      - path: LebaneseLearn
        excludes:
          - Resources/Content
      - path: LebaneseLearn/Resources/Content
        type: folder
        buildPhase: resources
    entitlements:
      path: LebaneseLearn/App/LebaneseLearn.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.arabicisbeautiful.app
        com.apple.developer.icloud-services:
          - CloudKit
    settings:
      base:
        INFOPLIST_FILE: LebaneseLearn/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.arabicisbeautiful.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
